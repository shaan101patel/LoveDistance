# LoveDistance — Supabase local config. Link remote: `supabase link --project-ref nbegtkxuzuepxkkgjcly`
project_id = "nbegtkxuzuepxkkgjcly"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"

[storage]
enabled = true
file_size_limit = "50MiB"

# Called with Authorization: Bearer <SERVICE_ROLE_KEY> (scheduled job or CI), not end-user JWT.
[functions.notification-digest]
verify_jwt = false

# Database Webhook or backend calls with service role; sends Expo pushes when EXPO_ACCESS_TOKEN is set.
[functions.dispatch-expo-push]
verify_jwt = false
